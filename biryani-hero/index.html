<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Biryani. - Your Delicious Biryani Starts Here. Premium, hot, and freshly prepared biryani delivered to your door.">
    <title>Biryani. - Best Biryani in Town</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="hero">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="logo">Biryani.</div>
            <ul class="nav-links">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Menu</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            <div class="nav-icons">
                <div class="icon-btn" aria-label="User Profile">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <div class="icon-btn cart-btn" aria-label="Shopping Cart">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="badge">3</span>
                </div>
            </div>
        </nav>

        <!-- Main Hero Content -->
        <main class="hero-content">
            <h1 class="headline">Your Delicious<br>Biryani Starts Here!</h1>
            <p class="subtitle">Gather your friends and family and enjoy the best biryani in town. Freshly prepared with aromatic spices and delivered hot.</p>
            <button class="cta-btn">View Our Menu</button>
        </main>

        <!-- Centered Hero Image and Carousel Arrows -->
        <div class="hero-image-container">
            <button class="nav-arrow left-arrow" aria-label="Previous image">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            
            <img src="biryani.png" alt="Premium Bowl of Biryani" class="biryani-img">
            
            <button class="nav-arrow right-arrow" aria-label="Next image">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>

        <!-- Floating Anti-Gravity Ingredients -->
        <div class="floating-ingredients">
            <div class="ingredient" style="--delay: 0s; --y: 15px; --r: 15deg; top: 22%; left: 15%;">🍃</div>
            <div class="ingredient" style="--delay: 1.2s; --y: 20px; --r: -25deg; top: 60%; left: 8%;">🌶️</div>
            <div class="ingredient" style="--delay: 2.5s; --y: -15px; --r: 30deg; top: 18%; right: 20%;">🧅</div>
            <div class="ingredient" style="--delay: 0.8s; --y: 10px; --r: -15deg; top: 45%; right: 10%;">🥚</div>
            <div class="ingredient" style="--delay: 1.5s; --y: -20px; --r: 45deg; top: 75%; right: 15%;">🍅</div>
            <div class="ingredient" style="--delay: 3s; --y: 15px; --r: 10deg; top: 82%; left: 22%;">🍋</div>
            <!-- Custom CSS elements for difficult emojis -->
            <div class="ingredient i-saffron" style="--delay: 0.5s; --y: -10px; --r: 60deg; top: 32%; left: 28%;"></div>
            <div class="ingredient i-cinnamon" style="--delay: 2s; --y: 25px; --r: -40deg; top: 48%; left: 15%;"></div>
            <div class="ingredient i-cardamom" style="--delay: 1.8s; --y: -15px; --r: 20deg; top: 30%; right: 35%;"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
